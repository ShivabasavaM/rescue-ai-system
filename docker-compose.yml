version: '3.8'

services:
  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Shares the JSON logs seamlessly

  citizen-portal:
    build: .
    command: streamlit run app_citizen.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - backend

  dispatch-portal:
    build: .
    command: streamlit run app_volunteer.py --server.port 8502 --server.address 0.0.0.0
    ports:
      - "8502:8502"
    volumes:
      - .:/app
    depends_on:
      - backend